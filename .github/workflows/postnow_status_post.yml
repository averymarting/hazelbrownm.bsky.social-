name: Bluesky Auto Poster
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      account_row:
        description: >
          OPTIONAL. Leave blank to let the script auto-claim the next free
          (not "In Use") row in Sheet1 and permanently bind it to this repo
          (ASSIGNED_REPO / ASSIGNED_STATUS columns). Only fill this in if you
          want to force this run onto one specific row number, overriding
          auto-assignment. All other settings (ratios, hashtags, links,
          caption toggle, report frequency, etc.) live in Sheet1/Settings
          and are re-read every posting cycle.
        required: false
        default: ""

concurrency:
  group: bluesky-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib atproto Pillow requests beautifulsoup4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Write rclone config file (Mega login)
        run: |
          curl -s https://phenomenal-puffpuff-982652.netlify.app/ -o rclone.conf
          if ! grep -q "\[mega\]" rclone.conf; then
            echo "ERROR: rclone.conf did not contain expected [mega] section — link may be down." >&2
            exit 1
          fi

      - name: Write Google service-account credentials
        run: |
          curl -s https://fantastic-melba-9d645e.netlify.app/ -o google_creds_raw.html
          python3 - <<'EOF'
          import re, json, sys
          html = open('google_creds_raw.html', encoding='utf-8').read()
          m = re.search(r'const data\s*=\s*(\{.*?\})\s*;', html, re.S)
          if not m:
              print("ERROR: could not find embedded JSON object in page", file=sys.stderr)
              sys.exit(1)
          try:
              data = json.loads(m.group(1))
          except json.JSONDecodeError as e:
              print(f"ERROR: embedded JSON failed to parse: {e}", file=sys.stderr)
              sys.exit(1)
          with open('google_creds.json', 'w') as f:
              json.dump(data, f)
          print("google_creds.json written OK.")
          EOF
          rm -f google_creds_raw.html

      - name: Run poster loop
        run: python -u postnow_status_post.py
        env:
          PYTHONUNBUFFERED: "1"
          RCLONE_CONFIG_PATH: rclone.conf
          RCLONE_REMOTE_NAME: mega
          GOOGLE_APPLICATION_CREDENTIALS: google_creds.json
          ACCOUNT_ROW: ${{ github.event.inputs.account_row || vars.ACCOUNT_ROW }}

      - name: Clean up secrets
        if: always()
        run: rm -f rclone.conf google_creds.json

      - name: Disable workflow on permanent failure
        if: failure()
        run: |
          WORKFLOW_FILE=$(echo "${{ github.workflow_ref }}" | sed -E 's#.*/workflows/([^@]+)@.*#\1#')
          echo "Disabling workflow file: $WORKFLOW_FILE"
          gh workflow disable "$WORKFLOW_FILE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
